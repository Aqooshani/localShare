name: Build LocalShare

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller ^
          --onefile ^
          --name LocalShare ^
          app.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: LocalShare
          path: dist/LocalShare.exe
